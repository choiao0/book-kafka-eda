spring:
  application:
    name: bookstore

  datasource:
    url: jdbc:mysql://localhost:3306/bookstore?serverTimezone=Asia/Seoul
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

  mvc:
    view:
      prefix: /WEB-INF/views/
      suffix: .jsp